# Quota Workflow Add Or Update Provider

## Action

Follow the add-or-update-provider workflow:
1. Add or update provider implementation in src/providers (e.g., create src/providers/vertex.ts).
2. Update provider registry/index (src/providers/index.ts).
3. Update configuration logic to support toggling (src/config.ts, CLI commands).
4. Update dashboard UI to display new provider (src/dashboard.tsx).
5. Update menubar app settings UI to add toggle and settings for provider (mac/Sources/CodeBurnMenubar/Views/SettingsView.swift, AgentTabStrip.swift, AppStore.swift, CodeBurnApp.swift).
6. Add or update provider display names (src/dashboard.tsx or similar).
7. Update or add tests for provider registry and toggling (tests/provider-registry.test.ts, mac/Tests/CodeBurnMenubarViewTests/SettingsViewTests.swift).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/providers/*.ts, src/providers/index.ts, src/config.ts

