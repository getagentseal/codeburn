name: Release macOS Menubar

# Triggers on a `mac-v*` tag push (e.g. `git tag mac-v0.8.0 && git push origin mac-v0.8.0`),
# or manually via the Actions tab. Builds a universal arm64+x86_64 bundle, ad-hoc signs it,
# zips via `ditto`, computes a SHA-256 sidecar so the installer can verify integrity end-to-end,
# and uploads both the zip and the .sha256 to the GitHub Release. `npx codeburn menubar` then
# downloads the zip, fetches the sidecar, and refuses to install on hash mismatch.
on:
  push:
    tags:
      - 'mac-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the bundle (e.g. v0.8.0 or dev-preview)'
        required: true
        default: 'dev-preview'

permissions:
  contents: write  # Needed to create the release + upload assets.

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version label
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/mac-v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/mac-}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show Swift toolchain
        run: swift --version

      - name: Import Developer ID signing cert
        # Degrades cleanly when the optional secrets are absent -- the step logs and skips
        # without failing, so forks that have not set up an Apple Developer account still
        # get ad-hoc-signed builds via the fallback path in package-app.sh.
        # Required secrets to enable Developer ID signing:
        #   APPLE_DEVELOPER_ID_P12_BASE64       -- base64-encoded .p12 (cert + private key)
        #   APPLE_DEVELOPER_ID_P12_PASSWORD     -- password for the .p12
        #   APPLE_DEVELOPER_ID_SIGNING_IDENTITY -- e.g. "Developer ID Application: ACME, Inc. (TEAMID)"
        # The keychain is discarded when the runner VM is torn down, so the imported cert
        # never leaves the job.
        id: signing
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [[ -z "${P12_BASE64}" || -z "${P12_PASSWORD}" || -z "${SIGNING_IDENTITY}" ]]; then
            echo "No Developer ID secrets set; falling back to ad-hoc signing."
            echo "identity=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/codeburn-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/codeburn-developer-id.p12"
          # Clean up the decoded .p12 on every exit path, not just the happy one. With
          # `set -euo pipefail` in effect, a failure in any of the `security` invocations
          # below would otherwise leave the private key sitting on $RUNNER_TEMP until the
          # runner VM is reaped.
          trap 'rm -f "$CERT_PATH"' EXIT
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Prepend the new keychain to the existing user search list. Capture the existing
          # list into a variable first so word-splitting doesn't mangle paths containing
          # whitespace (macos-latest runners don't normally hit this, but it's a one-line
          # improvement and removes a future foot-gun on self-hosted runners).
          existing=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN" $existing
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          echo "identity=${SIGNING_IDENTITY}" >> "$GITHUB_OUTPUT"
          echo "Developer ID cert imported into an ephemeral keychain."

      - name: Build + bundle + zip
        env:
          DEVELOPER_ID_SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
        run: mac/Scripts/package-app.sh "${{ steps.version.outputs.value }}"

      - name: Notarise + staple
        # Only runs when Developer ID signing succeeded AND notary credentials are present.
        # Notarisation re-verifies the signature server-side and stapling embeds the ticket
        # so Gatekeeper clears the bundle offline on first launch. Without stapling, users
        # who install while offline would see the "cannot verify developer" prompt until the
        # machine can reach apple.com.
        # Required secrets:
        #   APPLE_NOTARY_APPLE_ID       -- Apple ID email
        #   APPLE_NOTARY_APP_PASSWORD   -- app-specific password from appleid.apple.com
        #   APPLE_NOTARY_TEAM_ID        -- 10-char team ID
        if: steps.signing.outputs.identity != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ID}" || -z "${APP_PASSWORD}" || -z "${TEAM_ID}" ]]; then
            echo "Notary credentials missing; skipping notarisation (bundle is signed but not notarised)."
            exit 0
          fi
          cd mac/.build/dist
          for archive in CodeBurnMenubar-*.zip; do
            echo "Submitting $archive to notarytool..."
            xcrun notarytool submit "$archive" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait
            # Staple the ticket onto the unpacked bundle, then re-zip so the published archive
            # carries the staple. notarytool only accepts zips, but the ticket must live on
            # the .app bundle itself, not the zip envelope.
            app_dir="$(basename "$archive" .zip).unpacked"
            rm -rf "$app_dir"
            mkdir "$app_dir"
            /usr/bin/ditto -x -k "$archive" "$app_dir"
            xcrun stapler staple "$app_dir/CodeBurnMenubar.app"
            rm -f "$archive"
            (cd "$app_dir" && /usr/bin/ditto -c -k --keepParent "CodeBurnMenubar.app" "../$archive")
            rm -rf "$app_dir"
          done

      - name: Generate SHA-256 sidecars
        # Produces `<archive>.sha256` alongside each zip in the standard `sha256sum` format
        # ("<hex>  <filename>"). The installer downloads this sidecar and refuses to proceed
        # on mismatch, so an attacker would have to swap both files atomically to deliver a
        # malicious binary.
        working-directory: mac/.build/dist
        run: |
          set -euo pipefail
          for archive in CodeBurnMenubar-*.zip; do
            shasum -a 256 "$archive" > "$archive.sha256"
            echo "Wrote sidecar for $archive:"
            cat "$archive.sha256"
          done

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CodeBurnMenubar-${{ steps.version.outputs.value }}
          path: |
            mac/.build/dist/CodeBurnMenubar-*.zip
            mac/.build/dist/CodeBurnMenubar-*.zip.sha256
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/mac-v')
        # Pinned to v2.6.2 commit SHA instead of the mutable @v2 tag. Third-party actions in
        # the release path should be pinned so a tag move on the upstream repo cannot substitute
        # new code into the workflow that ships the macOS bundle. Upgrade by resolving the target
        # tag to its 40-char SHA (e.g. `git ls-remote https://github.com/softprops/action-gh-release
        # refs/tags/v2.X.Y`) and updating both the hash and the trailing annotation.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Menubar ${{ steps.version.outputs.value }}
          body: |
            Install with:

            ```
            npx codeburn menubar
            ```

            That command drops the app into `~/Applications` and launches it. The installer
            downloads the SHA-256 sidecar published alongside the zip and refuses to install
            on hash mismatch. If this release was built with Developer ID signing + notarisation
            enabled (repo secrets set), macOS Gatekeeper will accept the bundle silently.
            Otherwise it is ad-hoc signed and you'll see "cannot verify developer" on first
            launch -- right-click the app in Finder and pick Open to confirm.
          files: |
            mac/.build/dist/CodeBurnMenubar-*.zip
            mac/.build/dist/CodeBurnMenubar-*.zip.sha256
          fail_on_unmatched_files: true
